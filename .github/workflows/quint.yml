name: Quint

on:
  push:
  pull_request:

jobs:
  specs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install
        run: npm install

      - name: Install Quint Rust evaluator
        env:
          GH_TOKEN: ${{ github.token }}
          EVALUATOR_VERSION: v0.5.0
          EVALUATOR_ASSET: quint_evaluator-x86_64-unknown-linux-gnu.tar.gz
        run: |
          evaluator_dir="$HOME/.quint/rust-evaluator-$EVALUATOR_VERSION"
          mkdir -p "$evaluator_dir"
          gh release download "evaluator/$EVALUATOR_VERSION" \
            --repo informalsystems/quint \
            --pattern "$EVALUATOR_ASSET" \
            --dir "$evaluator_dir" \
            --clobber
          tar -xzf "$evaluator_dir/$EVALUATOR_ASSET" -C "$evaluator_dir"
          chmod +x "$evaluator_dir/quint_evaluator"
          rm "$evaluator_dir/$EVALUATOR_ASSET"

      - name: Check specs
        run: npm test

      - name: Bounded safety verification
        run: npm run verify

      - name: Temporal progress verification
        run: npm run verify:temporal
