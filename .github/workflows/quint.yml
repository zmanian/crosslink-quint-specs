name: Quint

on:
  push:
  pull_request:

jobs:
  specs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install
        run: npm install

      - name: Check specs
        run: npm test

      - name: Bounded safety verification
        run: npm run verify
